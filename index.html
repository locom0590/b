<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>VR Bilye Sıralama Oyunu</title>
    <!-- A-Frame Kütüphanesi -->
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
    <script>
      // OYUN AYARLARI
      let mevcutSeviye = 1; // Denemek istediğin seviyeyi buraya yaz
      
      const seviyeHizlari = {
        1: 0.02,  2: 0.03,  3: 0.04,  4: 0.05,  5: 0.07,
        6: 0.09,  7: 0.11,  8: 0.13,  9: 0.16,  10: 0.20
      };

      // SWITCH (YÖNLENDİRİCİ) BİLEŞENİ
      AFRAME.registerComponent('bilye-switch', {
        init: function () {
          this.yon = "sol"; // Başlangıçta sol açık
          
          this.el.addEventListener('mouseenter', () => {
            if (this.yon === "sol") {
              this.yon = "sag";
              // Sağa yönlendiğinde kapak sağa yatsın
              this.el.setAttribute('rotation', '0 0 -25'); 
              this.el.setAttribute('color', '#FF5733'); // Renk değişimi (Geri bildirim)
            } else {
              this.yon = "sol";
              // Sola yönlendiğinde kapak sola yatsın
              this.el.setAttribute('rotation', '0 0 25');
              this.el.setAttribute('color', '#33FF57');
            }
          });
        }
      });

      // BILYE HAREKET VE YER ÇEKİMİ BİLEŞENİ
      AFRAME.registerComponent('bilye-fizik', {
        init: function () {
          this.hiz = seviyeHizlari[mevcutSeviye];
          this.durum = "ana-kanal"; 
        },
        tick: function () {
          let pos = this.el.getAttribute('position');
          
          // 1. AŞAMA: Ana kanaldan aşağıya düz düşüş
          if (this.durum === "ana-kanal") {
            pos.y -= this.hiz; 
            
            // Switch'in hizasına (Y ekseninde 2.8'e) geldiğinde yönü kilitle
            if (pos.y <= 2.8) {
              let switchEl = document.querySelector('#anaSwitch');
              let switchYonu = switchEl.components['bilye-switch'].yon;
              
              // Karar anı: Switch nereye bakıyorsa bilye o kanala yönlenir
              if (switchYonu === "sol") {
                this.durum = "sol-kanal";
              } else {
                this.durum = "sag-kanal";
              }
            }
          } 
          // 2. AŞAMA: Sol kanalda ilerleme
          else if (this.durum === "sol-kanal") {
            pos.y -= this.hiz;
            pos.x -= this.hiz * 0.6; // Sola doğru kayma açısı
          } 
          // 3. AŞAMA: Sağ kanalda ilerleme
          else if (this.durum === "sag-kanal") {
            pos.y -= this.hiz;
            pos.x += this.hiz * 0.6; // Sağa doğru kayma açısı
          }

          // Pozisyonu güncelle
          this.el.setAttribute('position', pos);

          // Bilye haznelerin altına düştüğünde sahneden sil ve yenisini üret
          if (pos.y < 0) {
            this.el.parentNode.removeChild(this.el);
            bilyeUret(); 
          }
        }
      });

      // RASTGELE BİLYE ÜRETİCİ
      function bilyeUret() {
        let scene = document.querySelector('a-scene');
        if (!scene) return;
        
        let yeniBilye = document.createElement('a-sphere');
        
        // Seviyeye göre renk çeşitliliği eklenebilir, şimdilik Kırmızı ve Mavi
        let renkler = ['#FF0000', '#0000FF'];
        let rastgeleRenk = renkler[Math.floor(Math.random() * renkler.length)];
        
        yeniBilye.setAttribute('radius', '0.15');
        yeniBilye.setAttribute('color', rastgeleRenk);
        // Bilyenin doğuş noktası (Yukarıdaki borunun içi)
        yeniBilye.setAttribute('position', '0 5.5 -3'); 
        yeniBilye.setAttribute('bilye-fizik', '');
        
        scene.appendChild(yeniBilye);
      }

      // Sayfa yüklenince ilk bilyeyi bırak
      window.onload = () => {
        setTimeout(bilyeUret, 1500);
      };
    </script>
  </head>
  <body>

    <a-scene>
      <!-- Gökyüzü arka planı -->
      <a-sky color="#ECECEC"></a-sky>

      <!-- Kamera ve VR Baş Hareketi İmleci -->
      <a-entity camera look-controls position="0 2 0">
        <!-- Ekranın ortasındaki nişangah (Kafanı çevirdikçe bu imleç hareket eder) -->
        <a-cursor 
          id="cursor"
          raycaster="objects: .tıklanabilir"
          material="color: black; shader: flat"
          position="0 0 -1"
          geometry="primitive: ring; radiusInner: 0.02; radiusOuter: 0.03">
        </a-cursor>
      </a-entity>

      <!-- Üst Ana Kanal (Bilyelerin çıktığı boru) -->
      <a-cylinder position="0 4.8 -3" radius="0.08" height="1.5" color="#7f8c8d"></a-cylinder>

      <!-- SWITCH / YÖNLENDİRİCİ KAPAK -->
      <!-- class="tıklanabilir" sayesinde ortadaki imleç bu objeyi algılar -->
      <a-box id="anaSwitch" class="tıklanabilir" bilye-switch
             position="0 2.8 -3" width="0.8" height="0.1" depth="0.2" 
             rotation="0 0 25" color="#33FF57">
      </a-box>

      <!-- HEDEF RENK HAZNELERİ -->
      <!-- Sol Hazne (Mavi bilyeler için) -->
      <a-box position="-1.5 0.5 -3" width="0.8" height="0.8" depth="0.8" color="#0000FF" opacity="0.7"></a-box>
      
      <!-- Sağ Hazne (Kırmızı bilyeler için) -->
      <a-box position="1.5 0.5 -3" width="0.8" height="0.8" depth="0.8" color="#FF0000" opacity="0.7"></a-box>

    </a-scene>
  </body>
</html>
