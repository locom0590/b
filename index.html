<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>VR Ayna Terapisi & Senkronize İzleme</title>
    
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/build/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
    <script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>

    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000;
            font-family: sans-serif;
            color: white;
        }

        /* Giriş Panelleri */
        .menu-panel {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #111;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 10;
            padding: 20px;
        }
        h1 { margin-bottom: 25px; font-size: 1.6rem; text-align: center; }
        h2 { margin-bottom: 15px; font-size: 1.2rem; color: #aaa; }
        
        .mode-selection {
            display: flex;
            flex-direction: column;
            gap: 20px;
            width: 100%;
            max-width: 320px;
        }
        
        button {
            padding: 15px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            border: none;
            border-radius: 8px;
            color: white;
            transition: background 0.2s;
        }
        .btn-primary { background: #007bff; }
        .btn-success { background: #28a745; }
        .btn-secondary { background: #6c757d; margin-top: 10px; width: 100%; }
        
        input, select {
            padding: 12px;
            font-size: 1.1rem;
            border-radius: 6px;
            border: 1px solid #444;
            background: #222;
            color: white;
            text-align: center;
            margin-bottom: 10px;
            width: 100%;
        }

        .room-id-display {
            font-size: 1.8rem;
            font-weight: bold;
            color: #ffc107;
            background: #222;
            padding: 10px 20px;
            border-radius: 6px;
            margin: 15px 0;
            letter-spacing: 2px;
        }

        /* EKRAN MOTORU ALTYAPISI */
        .vr-display-engine {
            width: 100%;
            height: 100%;
            position: relative;
            display: none;
        }
        
        /* WebGL 3D Canvas Alanları */
        .eye-canvas-container {
            width: 50%;
            height: 100%;
            float: left;
            position: relative;
            background-color: #000;
        }
        canvas {
            width: 100%;
            height: 100%;
            display: block;
        }
        
        .center-divider {
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 6px;
            height: 100%;
            background-color: #ff0000;
            z-index: 5;
            box-shadow: 0 0 10px rgba(255, 0, 0, 0.5);
        }

        /* Görünmez Veri Toplama Kamerası */
        #hidden-video {
            position: absolute;
            width: 1px;
            height: 1px;
            opacity: 0;
            pointer-events: none;
        }
    </style>
</head>
<body>

    <video id="hidden-video" playsinline></video>

    <div id="menu-role" class="menu-panel">
        <h1>VR AXIS REHABILITATION</h1>
        <div class="mode-selection">
            <button class="btn-primary" onclick="selectRole('patient')">HASTA MODU (VR Cihazı)</button>
            <button class="btn-success" onclick="selectRole('observer')">TERAPİST MODU (İzleme)</button>
        </div>
    </div>

    <div id="menu-patient" class="menu-panel" style="display:none;">
        <h2>Sağlam Tarafı Seçip Yayını Başlatın</h2>
        <div class="mode-selection">
            <button class="btn-primary" onclick="startPatientApp('sag')">SAĞ</button>
            <button class="btn-primary" onclick="startPatientApp('sol')">SOL</button>
            <button class="btn-secondary" onclick="location.reload()">Geri</button>
        </div>
    </div>

    <div id="menu-room-display" class="menu-panel" style="display:none;">
        <h2>Terapist İçin Bağlantı Kodu:</h2>
        <div class="room-id-display" id="room-id-text">Üretiliyor...</div>
        <p style="color:#aaa; text-align:center; font-size:0.9rem; margin-bottom:20px;">
            Bu kodu izleyici cihaza girip bağlantı kurulduktan sonra<br>telefonu VR Box'a yerleştirebilirsiniz.
        </p>
        <button class="btn-success" style="width:100%; max-width:320px;" onclick="activateVRView()">VR EKRANINA GEÇ</button>
    </div>

    <div id="menu-observer" class="menu-panel" style="display:none;">
        <h2>Bağlantı Bilgilerini Girin</h2>
        <div class="mode-selection">
            <input type="text" id="target-room-id" placeholder="Oda Kodu (Örn: 4821)">
            <button class="btn-success" onclick="startObserverApp()">CANLI YAYINI İZLE</button>
            <button class="btn-secondary" onclick="location.reload()">Geri</button>
        </div>
    </div>

    <div id="vr-container" class="vr-display-engine">
        <div class="eye-canvas-container">
            <div class="center-divider"></div>
            <canvas id="leftEyeCanvas"></canvas>
        </div>
        <div class="eye-canvas-container">
            <div class="center-divider"></div>
            <canvas id="rightEyeCanvas"></canvas>
        </div>
    </div>

    <div id="observer-container" class="vr-display-engine">
        <div style="width:100%; height:100%;">
            <canvas id="observerCanvas"></canvas>
        </div>
    </div>

    <script>
        let peer = null;
        let myRoomId = "";
        let selectedSide = "sag";
        let isObserver = false;

        let scenes = {}, cameras = {}, renderers = {}, handModels = {};
        const connections = [[0,1], [1,2], [2,3], [3,4], [0,5], [5,6], [6,7], [7,8], [5,9], [9,10], [10,11], [11,12], [9,13], [13,14], [14,15], [15,16], [0,17], [17,18], [18,19], [19,20], [5,17]];

        function selectRole(role) {
            document.getElementById('menu-role').style.display = 'none';
            if (role === 'patient') {
                document.getElementById('menu-patient').style.display = 'flex';
            } else {
                isObserver = true;
                document.getElementById('menu-observer').style.display = 'flex';
            }
        }

        function init3D(canvasId, key) {
            const canvas = document.getElementById(canvasId);
            const scene = new THREE.Scene();
            scene.background = new THREE.Color(0x000000);

            const camera = new THREE.PerspectiveCamera(75, canvas.clientWidth / canvas.clientHeight, 0.1, 1000);
            camera.position.set(0, 0, 10); 

            const renderer = new THREE.WebGLRenderer({ canvas: canvas, antialias: true });
            renderer.setSize(canvas.clientWidth, canvas.clientHeight);

            const handGroup = new THREE.Group();
            const jointGeo = new THREE.SphereGeometry(0.22, 8, 8);
            const jointMat = new THREE.MeshBasicMaterial({ color: 0x00ffcc });
            
            for(let i=0; i<21; i++) {
                const mesh = new THREE.Mesh(jointGeo, jointMat);
                handGroup.add(mesh);
            }

            const lineMat = new THREE.LineBasicMaterial({ color: 0xffffff, linewidth: 2 });
            connections.forEach(() => {
                const geometry = new THREE.BufferGeometry();
                const positions = new Float32Array(6);
                geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
                const line = new THREE.Line(geometry, lineMat);
                handGroup.add(line);
            });

            scene.add(handGroup);
            scenes[key] = scene;
            cameras[key] = camera;
            renderers[key] = renderer;
            handModels[key] = handGroup;
        }

        function update3DHand(landmarks, key, shouldMirror) {
            const handGroup = handModels[key];
            if (!handGroup || !landmarks) return;

            for (let i = 0; i < 21; i++) {
                let x = (landmarks[i].x - 0.5) * 14;
                let y = -(landmarks[i].y - 0.5) * 14;
                let z = -landmarks[i].z * 10;

                if (shouldMirror) x = -x;
                handGroup.children[i].position.set(x, y, z);
            }

            let lineIdx = 21;
            connections.forEach(pair => {
                const p1 = handGroup.children[pair[0]].position;
                const p2 = handGroup.children[pair[1]].position;
                const line = handGroup.children[lineIdx];
                const pos = line.geometry.attributes.position.array;
                pos[0] = p1.x; pos[1] = p1.y; pos[2] = p1.z;
                pos[3] = p2.x; pos[4] = p2.y; pos[5] = p2.z;
                line.geometry.attributes.position.needsUpdate = true;
                lineIdx++;
            });

            renderers[key].render(scenes[key], cameras[key]);
        }

        async function startPatientApp(selection) {
            selectedSide = selection;
            document.getElementById('menu-patient').style.display = 'none';
            document.getElementById('menu-room-display').style.display = 'flex';

            init3D('leftEyeCanvas', 'left');
            init3D('rightEyeCanvas', 'right');

            const videoElement = document.getElementById('hidden-video');

            // Güvenlik duvarını aşmak için yerel tescilli asset yönlendirmesi
            const hands = new Hands({
                locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands@0.4.1646424515/${file}`
            });

            hands.setOptions({
                maxNumHands: 1,
                modelComplexity: 1,
                minDetectionConfidence: 0.6,
                minTrackingConfidence: 0.6
            });

            hands.onResults((results) => {
                if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
                    const landmarks = results.multiHandLandmarks[0];
                    const mirrorLeft = (selectedSide === 'sag');
                    const mirrorRight = (selectedSide === 'sag');

                    update3DHand(landmarks, 'left', mirrorLeft);
                    update3DHand(landmarks, 'right', mirrorRight);

                    if (peer && peer.connections) {
                        for (let connId in peer.connections) {
                            peer.connections[connId].forEach(conn => {
                                if (conn.open && conn.send) {
                                    conn.send({ landmarks, side: selectedSide });
                                }
                            });
                        }
                    }
                }
            });

            // Mobil Safari/Chrome için video kısıtlamalarını esnetme
            try {
                const stream = await navigator.mediaDevices.getUserMedia({
                    video: { facingMode: "environment", width: 640, height: 480 },
                    audio: false
                });
                videoElement.srcObject = stream;
                await videoElement.play();
                
                const camera = new Camera(videoElement, {
                    onFrame: async () => { await hands.send({ image: videoElement }); },
                    width: 640, height: 480
                });
                camera.start();
            } catch (err) {
                console.error("Kamera başlatma hatası:", err);
                alert("Kamera izni verilmedi veya tarayıcı kısıtlamasına takıldı.");
            }

            myRoomId = Math.floor(1000 + Math.random() * 9000).toString();
            document.getElementById('room-id-text').innerText = myRoomId;

            peer = new Peer(myRoomId);
        }

        function activateVRView() {
            document.getElementById('menu-room-display').style.display = 'none';
            document.getElementById('vr-container').style.display = 'block';
            
            const element = document.documentElement;
            if (element.requestFullscreen) element.requestFullscreen();
            else if (element.webkitRequestFullscreen) element.webkitRequestFullscreen();
            
            // Ekran açıldığında WebGL render alanlarını zorla tetikle
            window.dispatchEvent(new Event('resize'));
        }

        function startObserverApp() {
            const targetId = document.getElementById('target-room-id').value.trim();
            if (!targetId) { alert("Lütfen geçerli bir kod girin!"); return; }

            document.getElementById('menu-observer').style.display = 'none';
            document.getElementById('observer-container').style.display = 'block';

            init3D('observerCanvas', 'observer');

            peer = new Peer();
            peer.on('open', function() {
                const conn = peer.connect(targetId);
                conn.on('data', function(data) {
                    const mirrorObserver = (data.side === 'sag');
                    update3DHand(data.landmarks, 'observer', mirrorObserver);
                });
            });
        }

        window.addEventListener('resize', () => {
            ['left', 'right', 'observer'].forEach(key => {
                if (renderers[key]) {
                    const canvas = renderers[key].domElement;
                    cameras[key].aspect = canvas.clientWidth / canvas.clientHeight;
                    cameras[key].updateProjectionMatrix();
                    renderers[key].setSize(canvas.clientWidth, canvas.clientHeight);
                    renderers[key].render(scenes[key], cameras[key]);
                }
            });
        });
    </script>
</body>
</html>
